<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convertisseur de bases - Version eleve</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="container">
    <!-- Titre principal de la page -->
    <h1>Convertisseur de bases</h1>

    <!-- TODO HTML 1:
         Completer ce paragraphe pour expliquer en 1 phrase le but de l'outil.
         Exemple: "Cet outil convertit un entier d'une base vers une autre." -->
    <p class="intro-note">A completer par l'eleve.</p>

    <section class="card">
      <!-- Zone de saisie du nombre -->
      <label for="numberInput">Nombre a convertir</label>
      <!-- TODO HTML 2: modifier le placeholder avec 2 exemples personnels -->
      <input id="numberInput" type="text" placeholder="Exemple : 1011 ou 2F" />

      <!-- Choix des bases de depart et d'arrivee -->
      <div class="row">
        <div>
          <label for="fromBase">Base de depart</label>
          <select id="fromBase">
            <option value="2">Base 2 (binaire)</option>
            <option value="8">Base 8 (octale)</option>
            <option value="10" selected>Base 10 (decimale)</option>
            <option value="16">Base 16 (hexadecimale)</option>
          </select>
        </div>

        <div>
          <label for="toBase">Base d'arrivee</label>
          <select id="toBase">
            <option value="2">Base 2 (binaire)</option>
            <option value="8">Base 8 (octale)</option>
            <option value="10">Base 10 (decimale)</option>
            <option value="16" selected>Base 16 (hexadecimale)</option>
            <!-- TODO HTML 3:
                 Ajouter ici une option "Base 3" (value="3")
                 puis adapter le JavaScript pour la prendre en charge. -->
          </select>
        </div>
      </div>

      <!-- Bouton d'action -->
      <button id="convertBtn">Convertir</button>

      <!-- Message d'erreur ou d'information -->
      <p id="feedback" class="feedback"></p>

      <!-- Bloc resultat final -->
      <div class="result-box">
        <h2>Resultat</h2>
        <p id="result">-</p>
      </div>

      <!-- Bloc des etapes affichees par le script -->
      <div class="steps-box">
        <h2>Etapes du calcul</h2>
        <ol id="steps">
          <li>Aucune etape pour le moment.</li>
        </ol>
      </div>

      <!-- TODO HTML 4 (optionnel):
           Ajouter un bloc "Aide" avec 3 exemples de conversions a tester. -->
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
